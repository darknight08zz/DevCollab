[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter=@devcollab/shared build"]

[start]
cmd = "pnpm --filter=@devcollab/api exec prisma migrate deploy && pnpm --filter=@devcollab/api exec prisma generate && pnpm --filter=@devcollab/api build && pnpm --filter=@devcollab/api start"
